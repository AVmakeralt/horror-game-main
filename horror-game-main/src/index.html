<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gore in Crayon</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #221a24;
        color: #f6f0ea;
        font: 14px monospace;
      }

      #game {
        width: min(100vw, calc(100vh * 2.8571428571));
        max-width: 100vw;
        max-height: 100vh;
        aspect-ratio: 1280 / 448;
        height: auto;
        image-rendering: pixelated;
        border: 0;
        background: #221a24;
        display: block;
      }

      .fallback {
        position: fixed;
        bottom: 10px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="1280" height="448" aria-label="game canvas"></canvas>
    <div class="fallback">If the game does not start, run via a local server (e.g. python3 -m http.server).</div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
